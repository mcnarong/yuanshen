config-version: '2.1-character'
enabled: true

meta:
  character-id: 'traveler_anemo'
  display-name: '旅行者-风'
  element: 'element_anemo'
  weapon-type: 'sword'
  material: 'NETHER_STAR'
  rarity: 5
  default-level: 90
  max-level: 90
  aliases:
    - '旅行者'
    - '旅行者-风'
  tags:
    - '风元素'
    - '单手剑角色'
    - 'anemo'
    - 'sword'
    - '旅行者'
    - '旅行者-风'

stats:
  base-attack: 212
  base-health: 10875
  base-defense: 683
  element-bonus: 0.24

combat:
  normal:
    combo-reset-ms: 1400
    attachment:
      group: normal
      aura: 1.0
    segments:
      - 0.45
      - 0.44
      - 0.55
      - 0.60
      - 0.72

item:
  material: 'NETHER_STAR'
  display-name: '&6{character_name}'
  custom-model-data: -1
  lore:
    - '&8原神角色'
    - '&7元素: &f{element}'
    - '&7武器: &f{weapon_type}'
    - '&7等级: &f{level}'
    - '&7命座: &f{constellation}'
    - ''
    - '&7基础攻击: &f{base_attack}'
    - '&7基础生命: &f{base_health}'
    - '&7基础防御: &f{base_defense}'

notifications:
  e-cast: true
  e-absorb: false
  energy-after-e: false
  q-cast: true
  q-absorb: true
  q-hit: false
  passive-heal: true
  passive-slash: true
  skill-damage-feedback: false

e:
  enabled: true
  cooldown-ms: 8000
  attachment:
    group: e
    aura: 1.0
  slice:
    attachment:
      group: e_slice
      aura: 1.0
  release:
    attachment:
      group: e_release
      aura: 1.0
  energy-gain: 0
  cast-distance: 2.1
  windup-ticks: 10
  pull-interval-ticks: 2
  pull-radius: 4.8
  pull-strength: 0.20
  pull-vertical: 0.06
  hit-radius: 3.2
  aura-duration: 120
  slice-damage-multiplier: 0.28
  release-damage-multiplier: 0.82
  release-knockback-strength: 0.75
  release-knockback-vertical: 0.22
  hold:
    enabled: true
    initial-slice:
      attachment:
        group: e_hold_initial_slice
        aura: 1.0
    max-slice:
      attachment:
        group: e_hold_max_slice
        aura: 1.0
    minimum-held-ticks: 0
    pull-strength: 0.24
    initial-hit-ticks: [7, 10]
    max-hit-ticks: [17, 20, 27, 30]
    initial-slice-damage-multiplier: 0.28
    max-slice-damage-multiplier: 0.82
    finish-knockback-strength: 0.34
    finish-knockback-vertical: 0.16

charged:
  enabled: true
  require-sneaking: true
  attachment:
    group: charged
    aura: 1.0
  cooldown-ms: 900
  hunger-cost: 2
  slash-count: 3
  interval-ticks: 3
  range: 3.6
  radius: 1.6
  cone-degrees: 95.0
  max-targets: 3
  aura-duration: 1
  slash-1-damage-multiplier: 0.62
  slash-2-damage-multiplier: 0.62
  slash-3-damage-multiplier: 0.78

q:
  enabled: true
  cooldown-ms: 15000
  attachment:
    group: q
    aura: 1.0
  anemo:
    attachment:
      group: q_anemo
      aura: 1.0
  converted:
    attachment:
      group: q_converted
      aura: 1.0
  energy-cost: 60
  speed-per-tick: 0.62
  duration-ticks: 80
  radius: 2.25
  pull-strength: 0.18
  hit-cooldown-ms: 450
  aura-duration: 120
  damage-multiplier: 0.94
  converted-damage-multiplier: 0.30

passive:
  revival-wind:
    enabled: true
    cooldown-ms: 5000
    duration-ticks: 100
    interval-ticks: 20
    heal-max-health-ratio-per-tick: 0.02
  slash:
    enabled: true
    attachment:
      group: passive_slash
      aura: 1.0
    trigger-hit: 5
    combo-reset-ms: 1400
    path-length: 5.0
    path-radius: 1.0
    max-targets: 3
    aura-duration: 80
    damage-multiplier: 0.60

messages:
  e-cast: '&a[旅行者-风] 施放风涡剑，正在持续牵引并切割前方敌人。'
  e-cooldown: '&c[旅行者-风] E 冷却中，还剩 {time} 秒。'
  e-absorb: '&7[旅行者-风] 当前 E 仅造成风元素伤害，此消息默认停用。'
  charged-cooldown: '&c[旅行者-风] 重击冷却中，还剩 {time} 秒。'
  charged-no-hunger: '&c[旅行者-风] 饱食度不足，无法施放重击。'
  energy: '&7[旅行者-风] 当前能量：&f{energy}&7/&f{max_energy}'
  q-cast: '&b[旅行者-风] 风息激荡已释放，龙卷正在前进。'
  q-cooldown: '&c[旅行者-风] Q 冷却中，还剩 {time} 秒。'
  q-no-energy: '&c[旅行者-风] Q 所需能量不足，当前 {energy}/{max_energy}。'
  q-absorb: '&b[旅行者-风] 龙卷已吸收 {element} 元素。'
  q-hit: '&b[旅行者-风] 龙卷命中 {target}，造成 {damage} 点 {element} 伤害。'
  passive-heal: '&a[复苏之风] 接下来 {duration} 秒内持续恢复生命，每跳约 {heal}。'
  passive-slash: '&7[裂空之风] 第五段普攻斩出风刃，本次命中 {count} 个目标。'
