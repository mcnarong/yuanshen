    normal_damage: "&b触发！额外造成%s点伤害并给敌方附着水元素（潮湿）"
    already_has_water: "&b敌方已附着水元素，无额外伤害！"
    extinguish_fire: "&b熄灭了目标的火焰！"
    no_lore: "[水元素] 玩家%s手持物品无「水元素」Lore，不触发效果"

  # 后台日志消息
  logs:
    evaporation: "[水元素-蒸发] 目标%s火元素已消耗，最终伤害：%s"
    freeze: "[水元素-冻结] 目标%s冰元素已消耗，最终伤害：%s"
    electro_charge: "[水元素-感电] 目标%s雷元素触发感电，每%s秒伤害%s，持续%s秒"
    bloom: "[水元素-绽放] 目标%s草元素已消耗，绽放伤害：%s"
    remove_mark: "[水元素] 已移除目标%s的%s标记"
    expire_mark: "[元素过期] 目标%s的%s标记已移除"
    config_loaded: "水元素配置加载完成："
    config_base_damage: "基础伤害：%s"
    config_evaporation_multiplier: "蒸发倍率：%s"
    config_electro_charge_multiplier: "感电倍率：%s"
    config_element_duration: "元素过期时长：%s tick"

