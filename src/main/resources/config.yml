config-version: '1.0-beta' # 主配置版本号，用于配置迁移和缺失补全
debug: false # 兼容旧版调试开关，建议以 logging.debug 为准

logging: # 日志输出设置
  debug: false # 是否输出调试日志，true=输出，false=关闭
  cache-invalidation: false # 是否记录属性缓存失效日志，true=输出，false=关闭
  combat-summary: false # 是否记录战斗汇总日志，true=输出，false=关闭
  reaction-debug: false # 是否记录元素反应调试日志，true=输出，false=关闭
  lore-debug: false # 是否记录 Lore 解析调试日志，true=输出，false=关闭
  charged-debug: true # 是否记录重击相关调试日志，true=输出，false=关闭
  dependency-fallbacks: true # 缺少 PlaceholderAPI / MythicMobs 等可选依赖时是否提示回退信息
  missing-config-warnings: true # 配置节点缺失时是否打印警告

skill_trigger: # 技能触发方式设置；当前物品识别已改为内部标识，不再依赖 Lore 关键字
  preserve_entity_interactions: true # 是否优先保留原版实体交互，true=优先交互，false=优先技能

character_switch: # 角色切换时的自动武器处理
  auto_swap_weapon:
    enabled: true # 切换角色时是否自动尝试切到匹配武器
    remember_last_weapon: true # 是否记住每个角色上次使用的那把武器

constellation_star: # 命星物品外观配置，显示可改但识别不靠名字/Lore
  material: 'DIAMOND' # 材质，示例: DIAMOND / NETHER_STAR / PAPER
  display-name: '&b命星' # 显示名称，支持 {amount}
  custom-model-data: -1 # 自定义模型值，-1=不设置
  lore:
    - '&7用于提升角色命座。'
    - '&7每次升级消耗 1 个命星。'

elements: # 元素附伤基础倍率配置，这些值会作为表达式解析
  fire_base_damage: '1.0' # 火元素基础倍率，支持表达式/PAPI，示例: 1.0 或 1 + (%player_level% * 0.01)
  water_base_damage: '1.0' # 水元素基础倍率，支持表达式/PAPI，示例: 1.0
  ice_base_damage: '1.0' # 冰元素基础倍率，支持表达式/PAPI，示例: 1.0
  electro_base_damage: '1.0' # 雷元素基础倍率，支持表达式/PAPI，示例: 1.0
  anemo_base_damage: '1.0' # 风元素基础倍率，支持表达式/PAPI，示例: 1.0
  geo_base_damage: '1.0' # 岩元素基础倍率，支持表达式/PAPI，示例: 1.0
  dendro_base_damage: '1.0' # 草元素基础倍率，支持表达式/PAPI，示例: 1.0

reactions: # 元素反应倍率公式，支持 PlaceholderAPI、${custom_variables}、exp4j 数学表达式
  vaporize: '1.5 + (%player_level% * 0.01)' # 蒸发倍率，示例: 固定值 1.5 / 按等级成长 / 混合公式
  melt: '2.0 + (%player_level% * 0.02)' # 融化倍率，示例: 2.0 + (%player_level% * 0.02)
  overload: '2.75 + (%player_level% * 0.03)' # 超载倍率，示例: 2.75 + (%player_level% * 0.03)
  electro_charge: '2.0 + (%player_level% * 0.01)' # 感电倍率，示例: 2.0 + (%player_level% * 0.01)
  superconduct: '1.5 + (%player_level% * 0.005)' # 超导倍率，示例: 1.5 + (%player_level% * 0.005)
  shatter: '3.0' # 碎冰倍率，示例: 3.0
  aggravate: '1.8 + (%player_level% * 0.02)' # 超激化倍率，示例: 1.8 + (%player_level% * 0.02)
  spread: '1.8 + (%player_level% * 0.02)' # 蔓激化倍率，示例: 1.8 + (%player_level% * 0.02)
  swirl: '1.2 + (%player_level% * 0.01)' # 扩散倍率，示例: 1.2 + (%player_level% * 0.01)
  crystal_shield: '3.0 + (%player_level% * 0.05)' # 结晶护盾值公式，结果单位=护盾点数
  bloom: '2.0 + (%player_level% * 0.02)' # 绽放倍率，示例: 2.0 + (%player_level% * 0.02)
  hyperbloom: '3.0 + (%player_level% * 0.025)' # 超绽放倍率，示例: 3.0 + (%player_level% * 0.025)
  burgeon: '3.0 + (%player_level% * 0.03)' # 烈绽放倍率，示例: 3.0 + (%player_level% * 0.03)
  burning: '0.25' # 燃烧单跳倍率，示例: 0.25
  cooldown-ms: '500' # 元素反应统一触发间隔，结果单位=毫秒；同一攻击者对同一目标 0.5 秒内不会重复触发同类反应
  cooldown-overrides:
    crystal_shield: '1000'
  consume:
    vaporize_forward: '1.0' # 正向蒸发消耗量
    vaporize_reverse: '0.5' # 反向蒸发消耗量
    melt_forward: '1.0' # 正向融化消耗量
    melt_reverse: '0.5' # 反向融化消耗量
    overload: '1.0' # 超载消耗量
    electro_charge: '0.4' # 感电初次触发消耗量
    superconduct: '1.0' # 超导消耗量
    freeze: '0.6' # 冻结消耗量
    quicken: '0.3' # 原激化消耗量
    bloom: '0.5' # 绽放消耗量
    burning: '0.4' # 燃烧消耗量
    crystal: '0.5' # 结晶消耗量
    swirl: '0.5' # 扩散消耗量

effects: # 元素效果参数，支持 PlaceholderAPI、${custom_variables}、exp4j 数学表达式
  freeze_duration: '80 + (%player_level% * 2)' # 冻结持续时间，结果单位=tick，20 tick=1秒
  element_duration: '200' # 普通元素附着持续时间，结果单位=tick，示例: 200
  freeze:
    base_decay_per_second: '0.4' # 冻结量初始每秒衰减
    decay_growth_per_second: '0.1' # 冻结量衰减速度每秒增加量
    decay_recovery_per_second: '0.2' # 冻结结束后衰减速度每秒恢复量
    shatter_threshold: '0.55' # 可触发碎冰的最低冻结量
  electro_charge_duration: '100' # 感电持续时间，结果单位=tick
  electro_charge_interval: '20' # 感电每跳间隔，结果单位=tick
  electro_charge_jump_range: '13.0' # 感电传导水平半径，结果单位=格(block)
  electro_charge_jump_height: '3.0' # 感电传导纵向高度，结果单位=格(block)
  electro_charge_max_secondary_targets: '0' # 每次感电最多传导到几个额外目标，0=不设上限
  electro_charge_secondary_damage_multiplier: '1.0' # 周围传导伤害倍率，1.0=与中心感电同伤
  electro_charge_secondary_duration: '60' # 跳电附带的次级感电持续时间，结果单位=tick
  electro_charge_transfer_aura: '0.2' # 对潮湿目标传递的雷附着量
  electro_charge_tick_consume_water: '0.4' # 感电每跳消耗的水附着
  electro_charge_tick_consume_electro: '0.4' # 感电每跳消耗的雷附着
  overload_radius: '5.0' # 超载爆炸影响半径，结果单位=格(block)
  superconduct_radius: '5.0' # 超导影响半径，结果单位=格(block)
  superconduct_physical_resistance_reduction: '0.40' # 超导提供的物理减抗
  superconduct_physical_resistance_duration: '240' # 超导物理减抗持续时间，结果单位=tick
  burning_duration: '100 + (%player_level% * 5)' # 燃烧持续时间，结果单位=tick
  burning_interval: '5' # 燃烧跳频，结果单位=tick
  burning_damage_per_tick: '0.25' # 燃烧每跳伤害，结果单位=伤害点数
  burning_damage_range: '1.0' # 燃烧伤害影响范围，结果单位=格(block)
  burning_spread_aura: '0.4' # 燃烧对附近目标施加的火附着量
  burning_tick_consume_dendro: '0.08' # 燃烧每跳消耗的草附着
  burning_tick_refresh_pyro: '0.10' # 燃烧每跳补充的火附着
  pull_range: '5 + floor(%player_level% / 10)' # 聚怪范围，结果单位=格(block)，示例使用 exp4j 的 floor()
  seed_spawn_chance: '1.0' # 草原核生成概率，结果建议范围=0~1，示例: 0.5 / 1.0
  shield_duration: '300' # 结晶护盾持续时间，结果单位=tick
  crystallize_matching_element_absorption_multiplier: '2.5' # 同元素结晶护盾额外吸收倍率，2.5=100护盾可吸收250对应元素伤害
  crystal_chip_expire_time: '300' # 结晶碎片存在时间，结果单位=tick

custom_variables: # 自定义公式变量，可在其他表达式里通过 ${变量名} 引用
  player_power: '%player_level% * 2' # 示例变量，引用方式: ${player_power}，支持 PlaceholderAPI + 数学表达式

element_mastery: # 元素精通对反应伤害的影响
  enabled: true # 是否启用元素精通增伤，true=启用，false=关闭
  coefficient: '2.78' # 精通公式系数，支持表达式，示例: 2.78
  constant: '1400' # 精通公式常量，支持表达式，示例: 1400
  base_coefficient: '2.78' # 基础系数备份值，通常与 coefficient 保持一致
  base_constant: '1400' # 基础常量备份值，通常与 constant 保持一致
  reaction_multipliers: # 不同反应吃精通的权重，支持表达式
    vaporize: '1.0' # 蒸发权重，1.0=完整吃精通
    melt: '1.0' # 融化权重，1.0=完整吃精通
    overload: '0.8' # 超载权重，0.8=按 80% 精通收益
    electro_charge: '0.8' # 感电权重，0.8=按 80% 精通收益
    superconduct: '0.5' # 超导权重，0.5=按 50% 精通收益
    swirl: '0.6' # 扩散权重，0.6=按 60% 精通收益
    aggravate: '0.85' # 超激化权重，0.85=按 85% 精通收益
    spread: '0.85' # 蔓激化权重，0.85=按 85% 精通收益
    bloom: '0.8' # 绽放权重，0.8=按 80% 精通收益
    hyperbloom: '0.85' # 超绽放权重，0.85=按 85% 精通收益
    burgeon: '0.85' # 烈绽放权重，0.85=按 85% 精通收益
    crystal_shield: '0.5' # 结晶护盾权重，0.5=按 50% 精通收益
    burning: '0.6' # 燃烧权重，0.6=按 60% 精通收益
    freeze: '0.5' # 冻结权重，0.5=按 50% 精通收益
    default: '1.0' # 未单独配置反应的默认权重

messages: # 战斗提示文本
  reactions: # 元素反应消息模板，可用占位符按消息实际逻辑注入
    vaporize_forward: '&6[蒸发] 造成额外火元素伤害 &c{damage}&6。' # 火打水蒸发提示，{damage}=本次额外伤害
    vaporize_reverse: '&9[蒸发] 造成额外水元素伤害 &b{damage}&9。' # 水打火蒸发提示，{damage}=本次额外伤害
    melt_forward: '&b[融化] 造成额外冰元素伤害 &f{damage}&b。' # 冰打火融化提示，{damage}=本次额外伤害
    melt_reverse: '&6[融化] 造成额外火元素伤害 &c{damage}&6。' # 火打冰融化提示，{damage}=本次额外伤害
    overload: '&d[超载] 触发爆炸，额外伤害 &5{damage}&d。' # 超载提示，{damage}=本次额外伤害
    electro_charge: '&d[感电] 持续放电，额外伤害 &5{damage}&d。' # 感电提示，{damage}=本次额外伤害
    superconduct: '&d[超导] 造成范围伤害 &5{damage}&d，并削弱物理抗性。' # 超导提示，{damage}=本次额外伤害
    freeze: '&b[冻结] 造成冰元素伤害 &3{damage}&b，冻结 &f{seconds}&b 秒。' # 冻结提示，{damage}=本次伤害, {seconds}=冻结秒数
    shatter: '&7[碎冰] 造成额外物理伤害 &f{damage}&7。' # 碎冰提示，{damage}=本次额外伤害
    quicken: '&e[原激化] 目标进入激化状态。' # 原激化提示，无额外占位符
    aggravate: '&a[超激化] 造成额外伤害 &2{damage}&a。' # 超激化提示，{damage}=本次额外伤害
    spread: '&e[蔓激化] 造成额外伤害 &a{damage}&e。' # 蔓激化提示，{damage}=本次额外伤害
    bloom: '&a[绽放] 生成了草原核。' # 绽放提示，无额外占位符
    burning: '&c[燃烧] 目标进入燃烧状态。' # 燃烧提示，无额外占位符
    crystal: '&6[结晶] 吸收了 {elementName} 元素，获得护盾 &e{shield}&6。' # 结晶提示，{elementName}=元素名, {shield}=护盾值
    swirl: '&7[扩散 {elementName}] 造成扩散伤害 &f{damage}&7。' # 扩散提示，{elementName}=元素名, {damage}=本次伤害
    hyperbloom: '&d[超绽放] 造成追踪伤害 &5{damage}&d。' # 超绽放提示，{damage}=本次伤害
    burgeon: '&c[烈绽放] 造成范围伤害 &6{damage}&c。' # 烈绽放提示，{damage}=本次伤害
    normal_element: '&7[{elementName}] &f本次伤害 &c{damage}' # 普通元素附伤提示，{elementName}=元素名, {damage}=本次伤害

default_stats: # 玩家默认基础属性，这些值支持表达式，最终会被解析为数值
  attack_damage: '1' # 默认攻击力，结果单位=点，示例: 1 / 5 + %player_level%
  crit_rate: '0.05' # 默认暴击率，结果单位=比例(0-1)，示例: 0.05=5%
  crit_damage: '0.5' # 默认暴击伤害，结果单位=比例(0-1)，示例: 0.5=50%
  element_mastery: '0' # 默认元素精通，结果单位=点
  energy_recharge: '0' # 默认充能效率加成，结果单位=比例(0-1)
  healing_bonus: '0' # 默认治疗加成，结果单位=比例(0-1)
  defense: '0' # 默认防御力，结果单位=点
  health: '20' # 默认生命上限，结果单位=点
  fire_damage: '0' # 默认火伤加成，结果单位=比例(0-1)
  water_damage: '0' # 默认水伤加成，结果单位=比例(0-1)
  ice_damage: '0' # 默认冰伤加成，结果单位=比例(0-1)
  electro_damage: '0' # 默认雷伤加成，结果单位=比例(0-1)
  anemo_damage: '0' # 默认风伤加成，结果单位=比例(0-1)
  geo_damage: '0' # 默认岩伤加成，结果单位=比例(0-1)
  dendro_damage: '0' # 默认草伤加成，结果单位=比例(0-1)
  fire_resistance: '0' # 默认火元素抗性，结果单位=比例(0-1)
  water_resistance: '0' # 默认水元素抗性，结果单位=比例(0-1)
  ice_resistance: '0' # 默认冰元素抗性，结果单位=比例(0-1)
  electro_resistance: '0' # 默认雷元素抗性，结果单位=比例(0-1)
  anemo_resistance: '0' # 默认风元素抗性，结果单位=比例(0-1)
  geo_resistance: '0' # 默认岩元素抗性，结果单位=比例(0-1)
  dendro_resistance: '0' # 默认草元素抗性，结果单位=比例(0-1)
  physical_resistance: '0' # 默认物理抗性，结果单位=比例(0-1)

attribute_override: # 是否把原神计算后的属性同步到 Bukkit 原版属性
  enabled: false # 总开关，true=同步原神属性到原版属性，false=保持当前仅插件内部计算
  only-active-character-mode: true # 是否仅在角色模式激活时同步；true=拿着匹配原神武器才接管
  max_health: true # 是否同步生命上限到 Attribute.MAX_HEALTH
  attack_damage: true # 是否同步攻击力到 Attribute.ATTACK_DAMAGE
  defense_to_armor: false # 是否把防御力同步到 Attribute.ARMOR；默认关闭，避免原版护甲减伤过强
  armor-scale: 0.05 # defense_to_armor=true 时，最终护甲=防御力 * 该系数
  armor-max: 30.0 # defense_to_armor=true 时的护甲上限

attachment: # 元素附着与标准 ICD 配置
  standard-icd:
    enabled: true # 是否启用标准附着内置冷却；true=按 2.5s/3hit 控制附着，false=每次都可附着
    window-ms: 2500 # 标准 ICD 时间窗，结果单位=毫秒
    hits: 3 # 标准 ICD 命中计数窗，默认每 3 次命中只有第 1 次附着
    offset: 0 # 标准 ICD 起始偏移，0=第 1 次命中附着，1=第 2 次命中附着
  aura:
    normal: 1.0 # 普攻默认附着量，1.0=弱附着
    charged: 1.0 # 重击默认附着量
    skill: 1.0 # 战技默认附着量
    burst: 1.0 # 爆发默认附着量
    plunge: 1.0 # 下落攻击默认附着量
    duration-tier:
      weak-max: 0.5 # 弱附着上限，小于等于该值时按 weak-multiplier 计算附着持续时间
      normal-max: 1.0 # 常规附着上限
      strong-max: 2.0 # 强附着上限
      weak-multiplier: 0.8 # 弱附着持续时间倍率
      normal-multiplier: 1.0 # 常规附着持续时间倍率
      strong-multiplier: 1.65 # 强附着持续时间倍率
      massive-multiplier: 2.4 # 超强附着持续时间倍率

damage_bonus: # 额外伤害加成配置，formula 支持 PlaceholderAPI、${custom_variables}、exp4j 表达式
  health_bonus: # 基于生命值比例的额外伤害
    enabled: false # 是否启用生命值额外伤害，true=启用，false=关闭
    formula: '(%player_health% / %player_max_health%) * 0.5' # 生命值额外伤害公式，示例: 当前血量百分比 * 0.5
  food_bonus: # 基于饱食度的额外伤害
    enabled: false # 是否启用饱食度额外伤害，true=启用，false=关闭
    formula: '(%player_food_level% / 20) * 0.3' # 饱食度额外伤害公式，示例: 饱食度百分比 * 0.3

bloom_seed: # 草原核实体显示配置
  duration: '200' # 草原核存在时间，结果单位=tick
  max_nearby: '5' # 同一小范围内允许同时存在的草原核上限
  max_triggered_per_attack: '5' # 单次火/雷命中最多可连锁触发的草原核数量
  explosion_radius: '5.0' # 草原核自然爆炸半径，结果单位=格(block)
  natural_damage_multiplier: '1.0' # 草原核自然爆炸伤害倍率，1.0=使用绽放基础伤害
  player_damage_multiplier: '0.02' # 草原核对玩家/友方的伤害倍率
  visual: # 草原核外观设置
    custom_name: '§a草原核' # 草原核显示名称，单位=文本
    visible: 'false' # 是否显示名称，true=显示，false=隐藏
    particle_type: 'HAPPY_VILLAGER' # 粒子类型，单位=粒子ID
    particle_count: '3' # 每次刷新的粒子数量，结果单位=个
