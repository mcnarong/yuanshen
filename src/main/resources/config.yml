# 原神元素反应插件核心配置文件
# 所有数值、文本、时长均可在此配置，无需修改代码
# 颜色码使用&符号，例如&c=红色 &b=蓝色 &6=金色 &2=绿色

# ==================== 火元素配置 ====================
fire_element:
  # 基础数值配置
  base_damage: 5.0                # 火元素基础附加伤害（点）
  evaporation_multiplier: 1.5     # 蒸发倍率（火打水）
  melt_multiplier: 2.0            # 融化倍率（火打冰）
  burning_damage_per_tick: 0.5    # 燃烧每tick伤害（1秒=20tick）
  burning_duration: 100           # 燃烧持续时长（tick）
  overload_multiplier: 2.5        # 超载伤害倍率
  burst_multiplier: 3.0           # 烈绽放倍率
  fire_ticks: 100                 # 火焰燃烧tick数（对应游戏内火焰效果）
  element_duration: 200           # 火元素附着持续时长（tick）

  # 玩家提示消息（支持颜色码）
  messages:
    evaporation: "&c【蒸发】&f触发！额外造成%s点伤害，消耗敌方水元素！"
    melt: "&c【融化】&f触发！额外造成%s点伤害，消耗敌方冰元素！"
    burning: "&c【燃烧】&f触发！敌方每tick受到%s点伤害，持续%s秒！"
    overload: "&c【超载】&f触发！爆炸造成%s点伤害，消耗敌方雷元素！"
    burst: "&c【烈绽放】&f触发！造成%s点范围伤害，消耗敌方草元素！"
    normal_damage: "&c触发！额外造成%s点伤害并给敌方附着火元素"
    already_has_fire: "&c敌方已附着火元素，无额外伤害！"
    no_lore: "[火元素] 玩家%s手持物品无「火元素」Lore，不触发效果"

  # 后台日志消息（无颜色码）
  logs:
    evaporation: "[火元素-蒸发] 目标%s水元素已消耗，最终伤害：%s"
    melt: "[火元素-融化] 目标%s冰元素已消耗，最终伤害：%s"
    burning: "[火元素-燃烧] 目标%s被点燃，每tick伤害%s，持续%s秒"
    overload: "[火元素-超载] 目标%s雷元素已消耗，爆炸伤害：%s"
    burst: "[火元素-烈绽放] 目标%s草元素已消耗，范围伤害：%s"
    remove_mark: "[火元素] 已移除目标%s的%s标记"
    expire_mark: "[元素过期] 目标%s的%s标记已移除"
    config_loaded: "火元素配置加载完成："
    config_base_damage: "基础伤害：%s"
    config_evaporation_multiplier: "蒸发倍率：%s"
    config_melt_multiplier: "融化倍率：%s"
    config_burning_damage: "燃烧每tick伤害：%s"
    config_element_duration: "元素过期时长：%s tick"

# ==================== 水元素配置 ====================
water_element:
  # 基础数值配置
  base_damage: 5.0                # 水元素基础附加伤害（点）
  evaporation_multiplier: 2.0     # 蒸发倍率（水打火）
  electro_charge_multiplier: 1.2  # 感电伤害倍率
  bloom_multiplier: 1.8           # 绽放倍率
  slow_duration: 100              # 潮湿减速时长（tick）
  slow_level: 1                   # 潮湿减速等级（1=轻微减速）
  freeze_duration: 80             # 冻结时长（tick）
  freeze_level: 10                # 冻结等级（10=完全无法移动）
  electro_tick_interval: 20       # 感电触发间隔（tick）
  electro_duration: 100           # 感电持续时长（tick）
  element_duration: 200           # 水元素附着持续时长（tick）

  # 玩家提示消息
  messages:
    evaporation: "&b【蒸发】&f触发！额外造成%s点伤害，消耗敌方火元素！"
    freeze: "&b【冻结】&f触发！敌方被冻结%s秒，额外造成%s点伤害！"
