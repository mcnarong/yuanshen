config-version: '1.0-beta' # 属性配置版本号，用于后续自动补全与迁移

lore-stats: # 物品 Lore 属性解析总开关
  enabled: true # 是否启用从物品 Lore 中读取原神属性
  strip-color: true # 解析前是否去掉 Lore 里的颜色代码

  sources: # 参与属性统计的装备来源
    main-hand: true # 是否读取主手物品 Lore
    off-hand: false # 是否读取副手物品 Lore
    armor: true # 是否读取四件护甲 Lore

  attributes: # 可识别的属性键定义
    attack_damage: # 攻击力
      aliases: ['攻击力', '攻击'] # Lore 中可匹配的别名列表
      percent: false # 该属性是否按百分比解释

    defense: # 防御力
      aliases: ['防御力', '防御'] # Lore 中可匹配的别名列表
      percent: false # 该属性是否按百分比解释

    health: # 生命值上限
      aliases: ['生命值', '生命上限', '生命'] # Lore 中可匹配的别名列表
      percent: false # 该属性是否按百分比解释

    crit_rate: # 暴击率
      aliases: ['暴击率'] # Lore 中可匹配的别名列表
      percent: true # 该属性是否按百分比解释

    crit_damage: # 暴击伤害
      aliases: ['暴击伤害'] # Lore 中可匹配的别名列表
      percent: true # 该属性是否按百分比解释

    element_mastery: # 元素精通
      aliases: ['元素精通'] # Lore 中可匹配的别名列表
      percent: false # 该属性是否按百分比解释

    energy_recharge: # 元素充能效率
      aliases: ['元素充能效率', '充能效率'] # Lore 中可匹配的别名列表
      percent: true # 该属性是否按百分比解释

    healing_bonus: # 治疗加成
      aliases: ['治疗加成', '受治疗加成'] # Lore 中可匹配的别名列表
      percent: true # 该属性是否按百分比解释

    fire_damage: # 火元素伤害加成
      aliases: ['火元素伤害加成', '火元素伤害', '火伤'] # Lore 中可匹配的别名列表
      percent: true # 该属性是否按百分比解释

    water_damage: # 水元素伤害加成
      aliases: ['水元素伤害加成', '水元素伤害', '水伤'] # Lore 中可匹配的别名列表
      percent: true # 该属性是否按百分比解释

    ice_damage: # 冰元素伤害加成
      aliases: ['冰元素伤害加成', '冰元素伤害', '冰伤'] # Lore 中可匹配的别名列表
      percent: true # 该属性是否按百分比解释

    electro_damage: # 雷元素伤害加成
      aliases: ['雷元素伤害加成', '雷元素伤害', '雷伤'] # Lore 中可匹配的别名列表
      percent: true # 该属性是否按百分比解释

    anemo_damage: # 风元素伤害加成
      aliases: ['风元素伤害加成', '风元素伤害', '风伤'] # Lore 中可匹配的别名列表
      percent: true # 该属性是否按百分比解释

    geo_damage: # 岩元素伤害加成
