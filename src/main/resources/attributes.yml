    dendro_resistance: # 草元素抗性
      aliases: ['草元素抗性', '草抗'] # Lore 中可匹配的别名列表
      percent: true # 该属性是否按百分比解释

    all_element_resistance: # 全元素抗性
      aliases: ["全元素抗性", "全元素抗", "元素抗性", "元素抗"] # Lore 中可匹配的别名列表
