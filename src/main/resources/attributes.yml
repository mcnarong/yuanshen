    all_element_damage: # 全元素伤害加成
      aliases: ["全元素伤害加成", "全元素伤害", "全元素伤害加", "元素伤害加成", "元素伤害", "元素伤害加"] # Lore 中可匹配的别名列表
      percent: true # 该属性是否按百分比解释

    physical_damage: # 物理伤害加成
